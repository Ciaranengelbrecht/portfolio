<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#120f14" />
    <meta
      name="description"
      content="Ciaran Engelbrecht and Cheylin Manuel Save the Date wedding invitation." />
    <title>Save the Date | Ciaran &amp; Cheylin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
      rel="stylesheet" />

    <link rel="preload" as="image" href="./images/closed%20envelop.png" />
    <link rel="preload" as="image" href="./images/Invitation%20full.png" />
    <link rel="preload" as="image" href="./images/Countdown.png" />

    <style>
      :root {
        --ink: #2f1f15;
        --wine: #4a2820;
        --gold: #d5b371;
        --gold-soft: #f0d9a4;
        --ivory: #f5ecda;
        --mist: rgba(255, 244, 220, 0.14);
        --shadow: rgba(10, 8, 7, 0.48);
        --scene-duration: 900ms;
        --scene-ease: cubic-bezier(0.19, 0.85, 0.24, 1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100dvh;
        font-family: "Cormorant Garamond", serif;
        color: var(--ivory);
        background: radial-gradient(circle at 12% 8%, #503320 0%, transparent 30%),
          radial-gradient(circle at 86% 10%, #2c1822 0%, transparent 35%),
          radial-gradient(circle at 50% 120%, #1b1320 0%, transparent 42%),
          linear-gradient(145deg, #0d0a11 0%, #120d16 45%, #0b0810 100%);
        overflow-x: hidden;
        padding: max(12px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right))
          max(12px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      }

      .ambient {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }

      .ambient::before,
      .ambient::after {
        content: "";
        position: absolute;
        inset: -24%;
      }

      .ambient::before {
        background: radial-gradient(circle, rgba(213, 179, 113, 0.12) 0%, rgba(213, 179, 113, 0) 60%);
        animation: driftWarm 18s ease-in-out infinite alternate;
      }

      .ambient::after {
        background-image: radial-gradient(2px 2px at 16% 24%, rgba(255, 238, 201, 0.3), transparent),
          radial-gradient(1px 1px at 74% 18%, rgba(255, 255, 255, 0.23), transparent),
          radial-gradient(2px 2px at 86% 74%, rgba(241, 201, 124, 0.22), transparent),
          radial-gradient(1px 1px at 28% 80%, rgba(255, 255, 255, 0.2), transparent);
        background-size: 310px 310px, 250px 250px, 280px 280px, 220px 220px;
        animation: sparkleShift 15s ease-in-out infinite alternate;
      }

      .invite-app {
        position: relative;
        z-index: 1;
        min-height: calc(100dvh - max(24px, env(safe-area-inset-top) + env(safe-area-inset-bottom)));
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .crest {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 1px;
      }

      .crest .eyebrow {
        margin: 0;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        font-size: 0.58rem;
        color: rgba(248, 228, 186, 0.78);
      }

      .crest .title {
        margin: 0;
        font-family: "Alex Brush", cursive;
        font-size: clamp(2rem, 10vw, 3.2rem);
        line-height: 0.95;
        color: #f6dca5;
        text-shadow: 0 4px 14px rgba(0, 0, 0, 0.35), 0 0 28px rgba(213, 179, 113, 0.3);
      }

      .stage-shell {
        width: min(98vw, 470px);
        height: min(146vw, 86dvh);
        border-radius: 26px;
        padding: clamp(5px, 1.3vw, 10px);
        position: relative;
        background: linear-gradient(150deg, rgba(243, 223, 182, 0.38), rgba(86, 52, 35, 0.45));
        box-shadow: 0 22px 64px var(--shadow), inset 0 1px 0 rgba(255, 242, 212, 0.44),
          0 0 0 1px rgba(250, 225, 170, 0.22);
        transition: width var(--scene-duration) var(--scene-ease),
          height var(--scene-duration) var(--scene-ease), transform var(--scene-duration) var(--scene-ease);
      }

      .stage-shell::before,
      .stage-shell::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .stage-shell::before {
        inset: 7px;
        border-radius: 20px;
        border: 1px solid rgba(255, 236, 199, 0.35);
      }

      .stage-shell::after {
        left: 14px;
        right: 14px;
        bottom: 8px;
        height: 18px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(0, 0, 0, 0.42), transparent 72%);
        filter: blur(8px);
      }

      .stage-shell.is-expanded {
        width: min(99vw, 560px);
        height: min(168vw, 92dvh);
      }

      .stage {
        appearance: none;
        border: 0;
        width: 100%;
        height: 100%;
        border-radius: 20px;
        padding: 0;
        position: relative;
        overflow: hidden;
        background: rgba(20, 14, 11, 0.85);
        cursor: pointer;
        box-shadow: inset 0 0 0 1px rgba(255, 232, 189, 0.2);
      }

      .stage:focus-visible {
        outline: 2px solid rgba(243, 206, 134, 0.94);
        outline-offset: 4px;
      }

      .scene {
        position: absolute;
        inset: 0;
        opacity: 0;
        transform: perspective(1000px) scale(0.94) rotateX(4deg);
        filter: blur(4px) saturate(88%);
        transition: opacity var(--scene-duration) var(--scene-ease),
          transform var(--scene-duration) var(--scene-ease), filter var(--scene-duration) var(--scene-ease);
        pointer-events: none;
      }

      .scene.is-active {
        opacity: 1;
        transform: perspective(1000px) scale(1) rotateX(0deg);
        filter: blur(0) saturate(105%);
      }

      .scene.is-leaving {
        opacity: 0;
        transform: perspective(1000px) scale(1.05) rotateX(-2deg);
        filter: blur(6px);
      }

      .scene-art {
        width: 100%;
        height: 100%;
      }

      .scene-art img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        display: block;
      }

      .scene-closed .scene-art img {
        transform: scale(1.34);
      }

      .scene-full .scene-art img {
        transform: scale(1.14);
      }

      .scene-countdown .scene-art img {
        transform: scale(1.12);
      }

      .scene-sheen {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          130deg,
          rgba(255, 255, 255, 0.08) 0%,
          rgba(255, 255, 255, 0.02) 34%,
          rgba(255, 255, 255, 0) 56%,
          rgba(250, 222, 160, 0.12) 100%
        );
      }

      .scene-sheen::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          100deg,
          transparent 16%,
          rgba(255, 255, 255, 0.16) 38%,
          transparent 58%
        );
        transform: translateX(-112%);
        animation: sheenMove 7.2s ease-in-out infinite;
      }

      .ornate-corner {
        position: absolute;
        width: 54px;
        height: 54px;
        border: 1px solid rgba(240, 209, 142, 0.45);
        pointer-events: none;
      }

      .ornate-corner.top-left {
        top: 12px;
        left: 12px;
        border-right: 0;
        border-bottom: 0;
        border-top-left-radius: 12px;
      }

      .ornate-corner.top-right {
        top: 12px;
        right: 12px;
        border-left: 0;
        border-bottom: 0;
        border-top-right-radius: 12px;
      }

      .ornate-corner.bottom-left {
        bottom: 12px;
        left: 12px;
        border-right: 0;
        border-top: 0;
        border-bottom-left-radius: 12px;
      }

      .ornate-corner.bottom-right {
        bottom: 12px;
        right: 12px;
        border-left: 0;
        border-top: 0;
        border-bottom-right-radius: 12px;
      }

      .invitation-panel {
        position: absolute;
        left: 50%;
        top: 52%;
        transform: translate(-50%, -50%) scale(0.95);
        width: min(84%, 500px);
        max-height: 86%;
        overflow: hidden;
        padding: clamp(12px, 2.4vw, 22px) clamp(12px, 2.8vw, 24px);
        border-radius: 14px;
        border: 1px solid rgba(195, 147, 63, 0.45);
        background: linear-gradient(180deg, rgba(247, 235, 212, 0.78), rgba(236, 217, 178, 0.72));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55), 0 10px 34px rgba(51, 33, 22, 0.2);
        opacity: 0;
        transition: opacity 520ms ease, transform 760ms var(--scene-ease), filter 760ms var(--scene-ease);
        filter: blur(4px);
      }

      .invitation-panel::before,
      .invitation-panel::after {
        content: "";
        position: absolute;
        left: 14px;
        right: 14px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(177, 123, 44, 0.75), transparent);
      }

      .invitation-panel::before {
        top: 8px;
      }

      .invitation-panel::after {
        bottom: 8px;
      }

      .invitation-panel.is-revealed {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        filter: blur(0);
      }

      .copy-line {
        margin: 0;
        text-align: center;
        min-height: 1.08em;
        color: var(--wine);
        opacity: 0;
        filter: blur(8px);
        transform: translateY(14px) scale(0.98);
      }

      .copy-line + .copy-line {
        margin-top: clamp(4px, 1vw, 8px);
      }

      .invitation-panel.is-revealed .copy-line {
        animation: royalFlowIn 980ms cubic-bezier(0.2, 0.82, 0.21, 1) both;
        animation-delay: calc(170ms + (var(--line-index) * 120ms));
      }

      .copy-line.family {
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.17em;
        font-size: clamp(0.43rem, 2.1vw, 0.76rem);
      }

      .copy-line.save-date {
        margin-top: clamp(8px, 2.2vw, 14px);
        font-family: "Alex Brush", cursive;
        font-size: clamp(1.7rem, 7.5vw, 2.9rem);
        line-height: 1;
        color: #7f4320;
      }

      .copy-line.invite {
        font-size: clamp(0.74rem, 3.3vw, 1.08rem);
        letter-spacing: 0.03em;
      }

      .copy-line.amp {
        margin-top: clamp(2px, 0.8vw, 5px);
        font-family: "Alex Brush", cursive;
        font-size: clamp(1.16rem, 5vw, 1.68rem);
      }

      .copy-line.name {
        font-family: "Cinzel", serif;
        font-size: clamp(1.04rem, 4.8vw, 1.96rem);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .copy-line.date {
        margin-top: clamp(6px, 1.6vw, 10px);
        font-family: "Cinzel", serif;
        font-size: clamp(0.72rem, 3.1vw, 1.05rem);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .copy-line.year {
        font-family: "Cinzel", serif;
        font-size: clamp(1.28rem, 5.8vw, 2rem);
        letter-spacing: 0.21em;
      }

      .copy-line.location {
        font-size: clamp(0.72rem, 3.2vw, 1.04rem);
        letter-spacing: 0.04em;
      }

      .copy-line.note {
        margin-top: clamp(8px, 2.1vw, 14px);
        font-family: "Cinzel", serif;
        font-size: clamp(0.58rem, 2.5vw, 0.9rem);
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      .countdown-wrap {
        position: absolute;
        left: 50%;
        bottom: clamp(14px, 3vw, 24px);
        transform: translateX(-50%);
        width: min(92%, 500px);
        border-radius: 14px;
        border: 1px solid rgba(238, 206, 137, 0.52);
        background: linear-gradient(180deg, rgba(14, 8, 5, 0.7), rgba(14, 9, 8, 0.5));
        backdrop-filter: blur(2px);
        padding: clamp(10px, 2.2vw, 14px);
        box-shadow: 0 0 24px rgba(210, 176, 106, 0.24);
      }

      .countdown-kicker {
        margin: 0;
        text-align: center;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        font-size: clamp(0.56rem, 2.4vw, 0.76rem);
        color: rgba(246, 225, 182, 0.92);
      }

      .countdown-grid {
        margin-top: 8px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .count-unit {
        border-radius: 10px;
        border: 1px solid rgba(243, 212, 144, 0.38);
        background: rgba(22, 13, 10, 0.55);
        padding: 6px 4px;
        text-align: center;
      }

      .count-value {
        margin: 0;
        font-family: "Cinzel", serif;
        font-size: clamp(1rem, 4.8vw, 1.72rem);
        color: #f7e4bc;
        letter-spacing: 0.06em;
        line-height: 1.05;
      }

      .count-label {
        margin: 2px 0 0;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: clamp(0.48rem, 2.1vw, 0.62rem);
        color: rgba(248, 232, 196, 0.78);
      }

      .countdown-meta {
        margin: 8px 0 0;
        text-align: center;
        font-size: clamp(0.62rem, 2.6vw, 0.8rem);
        letter-spacing: 0.04em;
        color: rgba(255, 239, 206, 0.8);
      }

      .countdown-status {
        margin: 4px 0 0;
        text-align: center;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: clamp(0.5rem, 2.2vw, 0.66rem);
        color: rgba(244, 215, 156, 0.92);
      }

      .tap-hint {
        margin: 0;
        min-height: 22px;
        text-align: center;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.13em;
        font-size: 0.62rem;
        color: rgba(247, 232, 197, 0.86);
      }

      .tap-hint.is-muted {
        color: rgba(247, 232, 197, 0.64);
      }

      .stage-actions {
        min-height: 44px;
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: center;
      }

      .stage-action {
        border: 1px solid rgba(242, 209, 142, 0.52);
        color: #fbe7bd;
        background: linear-gradient(180deg, rgba(46, 28, 19, 0.88), rgba(28, 18, 13, 0.9));
        border-radius: 999px;
        padding: 10px 16px;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.58rem;
        cursor: pointer;
        transition: transform 260ms ease, box-shadow 260ms ease, border-color 260ms ease;
      }

      .stage-action:hover,
      .stage-action:focus-visible {
        transform: translateY(-1px);
        border-color: rgba(250, 225, 172, 0.86);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.28), 0 0 16px rgba(212, 174, 98, 0.26);
      }

      .stage-action:focus-visible {
        outline: 2px solid rgba(247, 216, 154, 0.96);
        outline-offset: 3px;
      }

      .stage-action.primary {
        background: linear-gradient(180deg, rgba(84, 50, 30, 0.93), rgba(46, 28, 17, 0.92));
      }

      .stage-action[hidden] {
        display: none;
      }

      .progress-dots {
        display: inline-flex;
        gap: 7px;
        align-items: center;
      }

      .progress-dots span {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        border: 1px solid rgba(248, 225, 177, 0.48);
        background: rgba(248, 225, 177, 0.18);
        transition: transform 300ms ease, background-color 300ms ease, box-shadow 300ms ease;
      }

      .progress-dots span.is-on {
        transform: scale(1.24);
        background: rgba(248, 225, 177, 0.92);
        box-shadow: 0 0 11px rgba(248, 225, 177, 0.62);
      }

      .noscript {
        margin-top: 12px;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.72rem;
        color: rgba(255, 233, 194, 0.8);
      }

      @media (min-width: 820px) {
        .invite-app {
          gap: 14px;
        }

        .stage-shell {
          width: min(86vw, 520px);
          height: min(126vw, 88dvh);
        }

        .stage-shell.is-expanded {
          width: min(90vw, 640px);
          height: min(132vw, 94dvh);
        }

        .stage-action {
          font-size: 0.62rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 1ms !important;
          scroll-behavior: auto !important;
        }

        .ambient::before,
        .ambient::after,
        .scene-sheen::after {
          animation: none !important;
        }
      }

      @keyframes driftWarm {
        from {
          transform: translate3d(-1%, -2%, 0);
          opacity: 0.8;
        }
        to {
          transform: translate3d(2%, 2%, 0);
          opacity: 1;
        }
      }

      @keyframes sparkleShift {
        from {
          transform: scale(1);
          opacity: 0.7;
        }
        to {
          transform: scale(1.05);
          opacity: 0.95;
        }
      }

      @keyframes sheenMove {
        0% {
          transform: translateX(-112%);
        }
        100% {
          transform: translateX(122%);
        }
      }

      @keyframes royalFlowIn {
        0% {
          opacity: 0;
          filter: blur(8px);
          transform: translateY(16px) scale(0.98);
        }
        65% {
          opacity: 1;
          filter: blur(0);
          transform: translateY(0) scale(1.015);
        }
        100% {
          opacity: 1;
          filter: blur(0);
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>

  <body>
    <div class="ambient" aria-hidden="true"></div>

    <main class="invite-app">
      <header class="crest" aria-hidden="true">
        <p class="eyebrow">Save the Date</p>
        <h1 class="title">Ciaran &amp; Cheylin</h1>
      </header>

      <div class="stage-shell" id="stageShell">
        <button
          class="stage"
          id="stage"
          type="button"
          aria-label="Closed envelope. Tap to open."
          aria-live="polite">
          <div class="scene scene-closed is-active" data-scene="closed" data-index="0">
            <div class="scene-art">
              <img src="./images/closed%20envelop.png" alt="Closed envelope" loading="eager" />
            </div>
            <div class="scene-sheen" aria-hidden="true"></div>
          </div>

          <div class="scene scene-full" data-scene="full" data-index="1">
            <div class="scene-art">
              <img src="./images/Invitation%20full.png" alt="Full invitation" loading="lazy" />
            </div>
            <div class="scene-sheen" aria-hidden="true"></div>

            <div class="invitation-panel" id="invitationPanel" aria-live="polite">
              <p class="copy-line family">TOGETHER WITH THEIR FAMILIES</p>
              <p class="copy-line save-date">Save the Date</p>
              <p class="copy-line invite">Invite you to celebrate their wedding</p>
              <p class="copy-line amp">&amp;</p>
              <p class="copy-line name">Ciaran Engelbrecht</p>
              <p class="copy-line name">Cheylin Manuel</p>
              <p class="copy-line date">SUNDAY, 26TH SEPTEMBER</p>
              <p class="copy-line year">2027</p>
              <p class="copy-line location">Perth, Western Australia</p>
              <p class="copy-line note">Formal Invitation to follow</p>
            </div>
          </div>

          <div class="scene scene-countdown" data-scene="countdown" data-index="2">
            <div class="scene-art">
              <img src="./images/Countdown.png" alt="Wedding countdown" loading="lazy" />
            </div>
            <div class="scene-sheen" aria-hidden="true"></div>

            <div class="countdown-wrap" role="status" aria-live="polite">
              <p class="countdown-kicker">Until We Say I Do</p>

              <div class="countdown-grid" aria-label="Time remaining to the wedding date">
                <div class="count-unit">
                  <p class="count-value" id="countDays">000</p>
                  <p class="count-label">Days</p>
                </div>
                <div class="count-unit">
                  <p class="count-value" id="countHours">00</p>
                  <p class="count-label">Hours</p>
                </div>
                <div class="count-unit">
                  <p class="count-value" id="countMinutes">00</p>
                  <p class="count-label">Minutes</p>
                </div>
                <div class="count-unit">
                  <p class="count-value" id="countSeconds">00</p>
                  <p class="count-label">Seconds</p>
                </div>
              </div>

              <p class="countdown-meta">Sunday, 26 September 2027 • 2:00 PM • Perth, WA</p>
              <p class="countdown-status" id="countdownStatus">Counting down in real time</p>
            </div>
          </div>

          <span class="ornate-corner top-left" aria-hidden="true"></span>
          <span class="ornate-corner top-right" aria-hidden="true"></span>
          <span class="ornate-corner bottom-left" aria-hidden="true"></span>
          <span class="ornate-corner bottom-right" aria-hidden="true"></span>
        </button>
      </div>

      <p class="tap-hint" id="tapHint">Tap to open the envelope</p>

      <div class="stage-actions" id="stageActions">
        <button class="stage-action primary" id="countdownBtn" type="button" hidden>
          Open Live Countdown
        </button>
        <button class="stage-action" id="invitationBtn" type="button" hidden>
          Return to Invitation
        </button>
      </div>

      <div class="progress-dots" id="progressDots" aria-hidden="true">
        <span class="is-on"></span>
        <span></span>
        <span></span>
      </div>

      <noscript>
        <p class="noscript">JavaScript enables the full invitation animation experience.</p>
      </noscript>
    </main>

    <script>
      (() => {
        const SCENES = {
          closed: 0,
          full: 1,
          countdown: 2
        };

        const stage = document.getElementById("stage");
        const stageShell = document.getElementById("stageShell");
        const tapHint = document.getElementById("tapHint");
        const countdownBtn = document.getElementById("countdownBtn");
        const invitationBtn = document.getElementById("invitationBtn");

        const countDays = document.getElementById("countDays");
        const countHours = document.getElementById("countHours");
        const countMinutes = document.getElementById("countMinutes");
        const countSeconds = document.getElementById("countSeconds");
        const countdownStatus = document.getElementById("countdownStatus");

        const dots = Array.from(document.querySelectorAll("#progressDots span"));
        const scenes = Array.from(document.querySelectorAll(".scene"));
        const invitationPanel = document.getElementById("invitationPanel");
        const copyLines = Array.from(document.querySelectorAll(".copy-line"));
        const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        let currentScene = SCENES.closed;
        let isTransitioning = false;

        const weddingTarget = new Date("2027-09-26T14:00:00+08:00").getTime();

        copyLines.forEach((line, index) => {
          line.style.setProperty("--line-index", index);
        });

        function pad(value) {
          return String(value).padStart(2, "0");
        }

        function setHint(message, muted = false) {
          tapHint.textContent = message;
          tapHint.classList.toggle("is-muted", muted);
        }

        function setActiveDots(index) {
          dots.forEach((dot, dotIndex) => {
            dot.classList.toggle("is-on", dotIndex <= index);
          });
        }

        function setAriaLabel(index) {
          const labels = [
            "Closed envelope. Tap to open.",
            "Full invitation displayed. Use Open Live Countdown button when ready.",
            "Countdown scene displayed."
          ];
          stage.setAttribute("aria-label", labels[index] || labels[0]);
        }

        function syncButtons(index) {
          countdownBtn.hidden = index !== SCENES.full;
          invitationBtn.hidden = index !== SCENES.countdown;
        }

        function updateShellSize(index) {
          stageShell.classList.toggle("is-expanded", index > SCENES.closed);
        }

        function revealInvitation() {
          invitationPanel.classList.remove("is-revealed");
          void invitationPanel.offsetWidth;
          invitationPanel.classList.add("is-revealed");
        }

        function updateCountdown() {
          const now = Date.now();
          const diff = Math.max(weddingTarget - now, 0);

          const dayMs = 24 * 60 * 60 * 1000;
          const hourMs = 60 * 60 * 1000;
          const minuteMs = 60 * 1000;

          const days = Math.floor(diff / dayMs);
          const hours = Math.floor((diff % dayMs) / hourMs);
          const minutes = Math.floor((diff % hourMs) / minuteMs);
          const seconds = Math.floor((diff % minuteMs) / 1000);

          countDays.textContent = String(days).padStart(3, "0");
          countHours.textContent = pad(hours);
          countMinutes.textContent = pad(minutes);
          countSeconds.textContent = pad(seconds);

          if (diff === 0) {
            countdownStatus.textContent = "It is wedding time";
          } else {
            countdownStatus.textContent = "Counting down to 2:00 PM on wedding day";
          }
        }

        function transitionToScene(targetIndex) {
          if (
            isTransitioning ||
            targetIndex === currentScene ||
            targetIndex < SCENES.closed ||
            targetIndex > SCENES.countdown
          ) {
            return;
          }

          isTransitioning = true;

          const previous = scenes[currentScene];
          const next = scenes[targetIndex];

          previous.classList.remove("is-active");
          previous.classList.add("is-leaving");
          next.classList.add("is-active");
          next.classList.remove("is-leaving");

          updateShellSize(targetIndex);
          setActiveDots(targetIndex);
          setAriaLabel(targetIndex);
          syncButtons(targetIndex);

          window.setTimeout(() => {
            previous.classList.remove("is-leaving");
            currentScene = targetIndex;
            isTransitioning = false;

            if (currentScene === SCENES.closed) {
              setHint("Tap to open the envelope");
            } else if (currentScene === SCENES.full) {
              setHint("Use the button below when you are ready for the countdown");
              revealInvitation();
            } else {
              setHint("Live countdown to Sunday, 26 September 2027 at 2:00 PM", true);
            }
          }, reducedMotion ? 1 : 680);
        }

        function handleStageAdvance() {
          if (isTransitioning) {
            return;
          }

          if (currentScene === SCENES.closed) {
            transitionToScene(SCENES.full);
          }
        }

        stage.addEventListener("click", handleStageAdvance);

        stage.addEventListener("keydown", (event) => {
          if (
            (event.key === "Enter" || event.key === " " || event.key === "ArrowRight") &&
            currentScene === SCENES.closed
          ) {
            event.preventDefault();
            handleStageAdvance();
          }
        });

        countdownBtn.addEventListener("click", () => {
          transitionToScene(SCENES.countdown);
        });

        invitationBtn.addEventListener("click", () => {
          transitionToScene(SCENES.full);
        });

        setActiveDots(SCENES.closed);
        setAriaLabel(SCENES.closed);
        updateShellSize(SCENES.closed);
        syncButtons(SCENES.closed);
        updateCountdown();
        window.setInterval(updateCountdown, 1000);
      })();
    </script>
  </body>
</html>
