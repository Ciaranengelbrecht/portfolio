<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111015" />
    <meta
      name="description"
      content="Ciaran Engelbrecht and Cheylin Manuel Save the Date wedding invitation." />
    <title>Save the Date | Ciaran &amp; Cheylin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&display=swap"
      rel="stylesheet" />
    <link rel="preload" as="image" href="./images/closed%20envelop.png" />
    <link rel="preload" as="image" href="./images/Invitation%20inside%20envelope.png" />
    <link rel="preload" as="image" href="./images/Invitation%20full.png" />
    <link rel="preload" as="image" href="./images/Countdown.png" />
    <style>
      :root {
        --ink: #23170f;
        --ivory: #efe4cf;
        --ivory-soft: #f7f1e6;
        --gold: #d2b06a;
        --gold-strong: #b4882d;
        --wine: #40241d;
        --shadow: rgba(11, 8, 6, 0.42);
        --scene-duration: 720ms;
        --scene-ease: cubic-bezier(0.22, 0.8, 0.26, 1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100dvh;
        font-family: "Cormorant Garamond", serif;
        color: var(--ivory-soft);
        background: radial-gradient(circle at 12% 8%, #4f3526 0%, transparent 32%),
          radial-gradient(circle at 88% 24%, #2a1920 0%, transparent 36%),
          linear-gradient(140deg, #151116 0%, #0f0b11 36%, #130f1a 74%, #0b090f 100%);
        overflow-x: hidden;
        padding: max(14px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
          max(14px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      }

      .ambient {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: radial-gradient(2px 2px at 18% 24%, rgba(250, 222, 166, 0.26), transparent),
          radial-gradient(2px 2px at 74% 12%, rgba(255, 250, 236, 0.16), transparent),
          radial-gradient(1px 1px at 90% 72%, rgba(248, 206, 121, 0.2), transparent),
          radial-gradient(1px 1px at 36% 76%, rgba(255, 255, 255, 0.11), transparent);
        background-size: 360px 360px, 280px 280px, 240px 240px, 300px 300px;
        opacity: 0.8;
        animation: sparkleShift 18s ease-in-out infinite alternate;
      }

      .ambient::before,
      .ambient::after {
        content: "";
        position: absolute;
        inset: -24%;
        pointer-events: none;
      }

      .ambient::before {
        background: radial-gradient(circle, rgba(210, 176, 106, 0.08) 0%, rgba(210, 176, 106, 0) 58%);
        animation: driftA 14s ease-in-out infinite alternate;
      }

      .ambient::after {
        background: radial-gradient(circle, rgba(255, 239, 209, 0.08) 0%, rgba(255, 239, 209, 0) 62%);
        animation: driftB 22s ease-in-out infinite alternate;
      }

      .invite-app {
        position: relative;
        min-height: calc(100dvh - max(28px, env(safe-area-inset-top) + env(safe-area-inset-bottom)));
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 1;
      }

      .crest {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        text-align: center;
      }

      .crest .eyebrow {
        margin: 0;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.32em;
        font-size: 0.66rem;
        color: rgba(247, 231, 194, 0.75);
      }

      .crest .title {
        margin: 0;
        font-family: "Great Vibes", cursive;
        font-size: clamp(2rem, 9vw, 3.1rem);
        line-height: 1;
        color: #f8e6be;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3), 0 0 30px rgba(210, 176, 106, 0.22);
      }

      .stage-shell {
        width: min(88vw, 340px);
        height: min(122vw, 478px);
        max-height: 76dvh;
        border-radius: 24px;
        padding: clamp(8px, 2vw, 12px);
        background: linear-gradient(150deg, rgba(240, 225, 188, 0.42), rgba(95, 58, 37, 0.38));
        box-shadow: 0 22px 60px var(--shadow), 0 0 0 1px rgba(250, 228, 190, 0.24),
          inset 0 1px 0 rgba(255, 242, 215, 0.4);
        transition: width var(--scene-duration) var(--scene-ease),
          height var(--scene-duration) var(--scene-ease), transform var(--scene-duration) var(--scene-ease);
        position: relative;
      }

      .stage-shell::before,
      .stage-shell::after {
        content: "";
        position: absolute;
        pointer-events: none;
        inset: 8px;
        border-radius: 18px;
      }

      .stage-shell::before {
        border: 1px solid rgba(255, 239, 205, 0.35);
      }

      .stage-shell::after {
        inset: auto 16px 10px;
        height: 18px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(0, 0, 0, 0.4), transparent 72%);
        filter: blur(8px);
      }

      .stage-shell.is-expanded {
        width: min(96vw, 520px);
        height: min(136vw, 690px);
      }

      .stage {
        appearance: none;
        border: 0;
        width: 100%;
        height: 100%;
        border-radius: 18px;
        padding: 0;
        position: relative;
        overflow: hidden;
        background: rgba(22, 15, 11, 0.82);
        cursor: pointer;
        box-shadow: inset 0 0 0 1px rgba(255, 236, 202, 0.2);
      }

      .stage:focus-visible {
        outline: 2px solid rgba(241, 206, 131, 0.95);
        outline-offset: 4px;
      }

      .scene {
        position: absolute;
        inset: 0;
        opacity: 0;
        transform: perspective(900px) scale(0.94) rotateX(3deg);
        transition: opacity var(--scene-duration) var(--scene-ease),
          transform var(--scene-duration) var(--scene-ease), filter var(--scene-duration) var(--scene-ease);
        filter: blur(2px);
        pointer-events: none;
      }

      .scene.is-active {
        opacity: 1;
        transform: perspective(900px) scale(1) rotateX(0);
        filter: blur(0);
      }

      .scene.is-leaving {
        opacity: 0;
        transform: perspective(900px) scale(1.05) rotateX(-2deg);
        filter: blur(5px);
      }

      .scene-art {
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 50% 18%, rgba(255, 233, 192, 0.16), rgba(255, 233, 192, 0));
      }

      .scene-art img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .scene-sheen {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          130deg,
          rgba(255, 255, 255, 0.08) 0%,
          rgba(255, 255, 255, 0.02) 28%,
          rgba(255, 255, 255, 0) 58%,
          rgba(255, 227, 159, 0.12) 100%
        );
      }

      .scene-sheen::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          100deg,
          transparent 18%,
          rgba(255, 255, 255, 0.18) 38%,
          transparent 56%
        );
        transform: translateX(-112%);
        animation: sheenMove 6.6s ease-in-out infinite;
      }

      .ornate-corner {
        position: absolute;
        width: 52px;
        height: 52px;
        border: 1px solid rgba(240, 211, 145, 0.45);
        pointer-events: none;
      }

      .ornate-corner.top-left {
        top: 12px;
        left: 12px;
        border-right: 0;
        border-bottom: 0;
        border-top-left-radius: 12px;
      }

      .ornate-corner.top-right {
        top: 12px;
        right: 12px;
        border-left: 0;
        border-bottom: 0;
        border-top-right-radius: 12px;
      }

      .ornate-corner.bottom-left {
        bottom: 12px;
        left: 12px;
        border-right: 0;
        border-top: 0;
        border-bottom-left-radius: 12px;
      }

      .ornate-corner.bottom-right {
        bottom: 12px;
        right: 12px;
        border-left: 0;
        border-top: 0;
        border-bottom-right-radius: 12px;
      }

      .invitation-panel {
        position: absolute;
        left: 50%;
        top: 52%;
        transform: translate(-50%, -50%);
        width: min(84%, 470px);
        max-height: 84%;
        overflow: hidden;
        padding: clamp(12px, 2.8vw, 22px) clamp(12px, 2.8vw, 24px);
        border-radius: 12px;
        border: 1px solid rgba(207, 163, 79, 0.45);
        background: linear-gradient(180deg, rgba(244, 232, 205, 0.76), rgba(233, 217, 186, 0.68));
        color: var(--wine);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55), 0 8px 30px rgba(52, 35, 24, 0.2);
      }

      .invitation-panel::before,
      .invitation-panel::after {
        content: "";
        position: absolute;
        left: 14px;
        right: 14px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(180, 128, 45, 0.78), transparent);
      }

      .invitation-panel::before {
        top: 8px;
      }

      .invitation-panel::after {
        bottom: 8px;
      }

      .copy-line {
        margin: 0;
        opacity: 0;
        min-height: 1.08em;
        text-align: center;
        letter-spacing: 0.03em;
        transform: translateY(6px);
        transition: opacity 260ms ease, transform 260ms ease;
      }

      .copy-line + .copy-line {
        margin-top: clamp(4px, 1vw, 8px);
      }

      .copy-line.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .copy-line.typing::after {
        content: "";
        display: inline-block;
        width: 1px;
        height: 0.92em;
        margin-left: 3px;
        background: currentColor;
        vertical-align: -0.06em;
        animation: caretBlink 0.8s step-end infinite;
      }

      .copy-line.is-complete::after {
        display: none;
      }

      .copy-line.family {
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-size: clamp(0.42rem, 2.2vw, 0.74rem);
      }

      .copy-line.save-date {
        margin-top: clamp(8px, 2.2vw, 14px);
        font-family: "Great Vibes", cursive;
        font-size: clamp(1.62rem, 7vw, 2.7rem);
        color: #7c431b;
      }

      .copy-line.invite {
        font-size: clamp(0.74rem, 3.3vw, 1.07rem);
        letter-spacing: 0.04em;
      }

      .copy-line.amp {
        font-family: "Great Vibes", cursive;
        font-size: clamp(1.08rem, 4.7vw, 1.6rem);
        margin-top: clamp(2px, 1vw, 6px);
      }

      .copy-line.name {
        font-family: "Cinzel", serif;
        font-size: clamp(1.03rem, 4.7vw, 1.92rem);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .copy-line.date {
        margin-top: clamp(6px, 1.6vw, 10px);
        font-family: "Cinzel", serif;
        font-size: clamp(0.72rem, 3.1vw, 1.05rem);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .copy-line.year {
        font-family: "Cinzel", serif;
        font-size: clamp(1.28rem, 5.8vw, 2rem);
        letter-spacing: 0.24em;
      }

      .copy-line.location {
        font-size: clamp(0.72rem, 3.2vw, 1.04rem);
        letter-spacing: 0.06em;
      }

      .copy-line.note {
        margin-top: clamp(8px, 2.1vw, 14px);
        font-family: "Cinzel", serif;
        font-size: clamp(0.58rem, 2.5vw, 0.9rem);
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }

      .countdown-banner {
        position: absolute;
        left: 50%;
        bottom: clamp(12px, 3vw, 24px);
        transform: translateX(-50%);
        border: 1px solid rgba(238, 209, 151, 0.58);
        border-radius: 999px;
        padding: 8px 16px;
        text-align: center;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: clamp(0.62rem, 2.6vw, 0.84rem);
        color: #f8e9c6;
        background: rgba(14, 8, 5, 0.52);
        box-shadow: 0 0 16px rgba(210, 176, 106, 0.28);
        animation: pulseBanner 2.8s ease-in-out infinite;
      }

      .tap-hint {
        margin: 0;
        min-height: 22px;
        text-align: center;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 0.64rem;
        color: rgba(247, 233, 199, 0.8);
      }

      .tap-hint.is-muted {
        color: rgba(247, 233, 199, 0.56);
      }

      .progress-dots {
        display: inline-flex;
        gap: 7px;
        align-items: center;
      }

      .progress-dots span {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        border: 1px solid rgba(248, 225, 177, 0.5);
        background: rgba(248, 225, 177, 0.2);
        transition: transform 320ms ease, background-color 320ms ease, box-shadow 320ms ease;
      }

      .progress-dots span.is-on {
        transform: scale(1.25);
        background: rgba(248, 225, 177, 0.9);
        box-shadow: 0 0 10px rgba(248, 225, 177, 0.65);
      }

      .noscript {
        margin-top: 12px;
        font-family: "Cinzel", serif;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(255, 233, 194, 0.8);
      }

      @media (min-width: 820px) {
        .invite-app {
          gap: 20px;
        }

        .stage-shell {
          width: min(78vw, 390px);
          height: min(108vw, 540px);
        }

        .stage-shell.is-expanded {
          width: min(86vw, 600px);
          height: min(120vw, 760px);
        }

        .tap-hint {
          font-size: 0.72rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 1ms !important;
          scroll-behavior: auto !important;
        }

        .ambient {
          animation: none;
        }

        .scene-sheen::after {
          display: none;
        }
      }

      @keyframes sparkleShift {
        from {
          opacity: 0.68;
          transform: scale(1);
        }
        to {
          opacity: 0.94;
          transform: scale(1.04);
        }
      }

      @keyframes driftA {
        from {
          transform: translate3d(-1%, -2%, 0);
        }
        to {
          transform: translate3d(2%, 2%, 0);
        }
      }

      @keyframes driftB {
        from {
          transform: translate3d(2%, 1%, 0);
        }
        to {
          transform: translate3d(-2%, -1%, 0);
        }
      }

      @keyframes sheenMove {
        0% {
          transform: translateX(-112%);
        }
        100% {
          transform: translateX(122%);
        }
      }

      @keyframes caretBlink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }

      @keyframes pulseBanner {
        0%,
        100% {
          transform: translateX(-50%) scale(1);
          box-shadow: 0 0 16px rgba(210, 176, 106, 0.3);
        }
        50% {
          transform: translateX(-50%) scale(1.03);
          box-shadow: 0 0 22px rgba(210, 176, 106, 0.46);
        }
      }
    </style>
  </head>
  <body>
    <div class="ambient" aria-hidden="true"></div>

    <main class="invite-app">
      <header class="crest" aria-hidden="true">
        <p class="eyebrow">Save the Date</p>
        <h1 class="title">Ciaran &amp; Cheylin</h1>
      </header>

      <div class="stage-shell" id="stageShell">
        <button
          class="stage"
          id="stage"
          type="button"
          aria-label="Closed envelope. Tap to open."
          aria-live="polite">
          <div class="scene scene-closed is-active" data-scene="closed" data-index="0">
            <div class="scene-art">
              <img src="./images/closed%20envelop.png" alt="Closed envelope" loading="eager" />
            </div>
            <div class="scene-sheen" aria-hidden="true"></div>
          </div>

          <div class="scene scene-inside" data-scene="inside" data-index="1">
            <div class="scene-art">
              <img src="./images/Invitation%20inside%20envelope.png" alt="Invitation peeking from envelope" loading="lazy" />
            </div>
            <div class="scene-sheen" aria-hidden="true"></div>
          </div>

          <div class="scene scene-full" data-scene="full" data-index="2">
            <div class="scene-art">
              <img src="./images/Invitation%20full.png" alt="Full invitation" loading="lazy" />
            </div>
            <div class="scene-sheen" aria-hidden="true"></div>

            <div class="invitation-panel" id="invitationPanel" aria-live="polite">
              <p class="copy-line family" data-speed="20" data-text="TOGETHER WITH THEIR FAMILIES"></p>
              <p class="copy-line save-date" data-speed="34" data-text="Save the Date"></p>
              <p
                class="copy-line invite"
                data-speed="16"
                data-text="Invite you to celebrate their wedding"></p>
              <p class="copy-line amp" data-speed="30" data-text="&amp;"></p>
              <p class="copy-line name" data-speed="28" data-text="Ciaran Engelbrecht"></p>
              <p class="copy-line name" data-speed="28" data-text="Cheylin Manuel"></p>
              <p class="copy-line date" data-speed="19" data-text="SUNDAY, 26TH SEPTEMBER"></p>
              <p class="copy-line year" data-speed="54" data-text="2027"></p>
              <p class="copy-line location" data-speed="18" data-text="Perth, Western Australia"></p>
              <p class="copy-line note" data-speed="16" data-text="Formal Invitation to follow"></p>
            </div>
          </div>

          <div class="scene scene-countdown" data-scene="countdown" data-index="3">
            <div class="scene-art">
              <img src="./images/Countdown.png" alt="Wedding countdown" loading="lazy" />
            </div>
            <div class="scene-sheen" aria-hidden="true"></div>
            <p class="countdown-banner">The Countdown Begins</p>
          </div>

          <span class="ornate-corner top-left" aria-hidden="true"></span>
          <span class="ornate-corner top-right" aria-hidden="true"></span>
          <span class="ornate-corner bottom-left" aria-hidden="true"></span>
          <span class="ornate-corner bottom-right" aria-hidden="true"></span>
        </button>
      </div>

      <p class="tap-hint" id="tapHint">Tap to open the envelope</p>

      <div class="progress-dots" id="progressDots" aria-hidden="true">
        <span class="is-on"></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <noscript>
        <p class="noscript">JavaScript enables the full invitation animation experience.</p>
      </noscript>
    </main>

    <script>
      (() => {
        const stage = document.getElementById("stage");
        const stageShell = document.getElementById("stageShell");
        const tapHint = document.getElementById("tapHint");
        const dots = Array.from(document.querySelectorAll("#progressDots span"));
        const scenes = Array.from(document.querySelectorAll(".scene"));
        const copyLines = Array.from(document.querySelectorAll(".copy-line"));
        const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        let currentScene = 0;
        let isTransitioning = false;
        let invitationStarted = false;
        let invitationComplete = false;
        let autoCountdownTimer = null;
        let hintTimer = null;
        const lineTimers = [];

        function clearTimers() {
          while (lineTimers.length) {
            clearInterval(lineTimers.pop());
          }
          if (autoCountdownTimer) {
            clearTimeout(autoCountdownTimer);
            autoCountdownTimer = null;
          }
          if (hintTimer) {
            clearTimeout(hintTimer);
            hintTimer = null;
          }
        }

        function setHint(message, muted = false) {
          tapHint.textContent = message;
          tapHint.classList.toggle("is-muted", muted);
        }

        function setActiveDot(index) {
          dots.forEach((dot, dotIndex) => {
            dot.classList.toggle("is-on", dotIndex <= index);
          });
        }

        function updateAriaLabel(index) {
          const labels = [
            "Closed envelope. Tap to open.",
            "Invitation inside envelope. Tap to reveal full invitation.",
            "Full invitation revealed.",
            "Countdown scene displayed."
          ];
          stage.setAttribute("aria-label", labels[index] || labels[0]);
        }

        function updateShellSize(index) {
          stageShell.classList.toggle("is-expanded", index >= 2);
        }

        function resetInvitationLines() {
          copyLines.forEach((line) => {
            line.textContent = "";
            line.classList.remove("is-visible", "typing", "is-complete");
          });
        }

        function typeLine(line, text, speed) {
          return new Promise((resolve) => {
            line.textContent = "";
            line.classList.add("is-visible", "typing");
            let charIndex = 0;
            const delay = Math.max(10, Number(speed) || 24);

            const timer = setInterval(() => {
              charIndex += 1;
              line.textContent = text.slice(0, charIndex);
              if (charIndex >= text.length) {
                clearInterval(timer);
                line.classList.remove("typing");
                line.classList.add("is-complete");
                resolve();
              }
            }, delay);

            lineTimers.push(timer);
          });
        }

        async function runInvitationWriteOut() {
          if (invitationStarted) {
            return;
          }

          invitationStarted = true;
          invitationComplete = false;
          resetInvitationLines();

          if (reducedMotion) {
            copyLines.forEach((line) => {
              line.classList.add("is-visible", "is-complete");
              line.textContent = line.dataset.text ? line.dataset.text.replace("&amp;", "&") : "";
            });
            invitationComplete = true;
            setHint("Countdown incoming", true);
            autoCountdownTimer = setTimeout(() => transitionToScene(3), 1400);
            return;
          }

          setHint("Your invitation is being inscribed", true);

          for (const line of copyLines) {
            const text = line.dataset.text ? line.dataset.text.replace("&amp;", "&") : "";
            const speed = Number(line.dataset.speed || 24);
            await typeLine(line, text, speed);
            await new Promise((resolve) => {
              hintTimer = setTimeout(resolve, 120);
            });
          }

          invitationComplete = true;
          setHint("Countdown opens shortly", true);
          autoCountdownTimer = setTimeout(() => transitionToScene(3), 1700);
        }

        function transitionToScene(targetIndex) {
          if (isTransitioning || targetIndex === currentScene || targetIndex < 0 || targetIndex > 3) {
            return;
          }

          clearTimers();
          isTransitioning = true;

          const previous = scenes[currentScene];
          const next = scenes[targetIndex];

          previous.classList.remove("is-active");
          previous.classList.add("is-leaving");

          next.classList.add("is-active");
          next.classList.remove("is-leaving");

          updateShellSize(targetIndex);
          setActiveDot(targetIndex);
          updateAriaLabel(targetIndex);

          window.setTimeout(() => {
            previous.classList.remove("is-leaving");
            currentScene = targetIndex;
            isTransitioning = false;

            if (currentScene === 0) {
              setHint("Tap to open the envelope");
            } else if (currentScene === 1) {
              setHint("Tap to reveal the invitation");
            } else if (currentScene === 2) {
              setHint("Unveiling your invitation", true);
              runInvitationWriteOut();
            } else {
              setHint("Save the date shared with love", true);
            }
          }, reducedMotion ? 1 : 540);
        }

        function handleAdvanceRequest() {
          if (isTransitioning) {
            return;
          }

          if (currentScene === 0) {
            transitionToScene(1);
            return;
          }

          if (currentScene === 1) {
            transitionToScene(2);
            return;
          }

          if (currentScene === 2 && invitationComplete) {
            transitionToScene(3);
          }
        }

        stage.addEventListener("click", handleAdvanceRequest);

        stage.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " " || event.key === "ArrowRight") {
            event.preventDefault();
            handleAdvanceRequest();
          }
        });
      })();
    </script>
  </body>
</html>
