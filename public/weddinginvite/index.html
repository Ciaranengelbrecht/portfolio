<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ciaran &amp; Cheylin | Invitation</title>
    <meta name="description" content="Wedding invitation for Ciaran and Cheylin." />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="mirror-page" data-step="closed">
    <main class="mirror-shell" aria-label="Wedding invitation mirror">
      <section class="mirror-stage" aria-live="polite">
        <article class="mirror-view mirror-view-closed" id="closedView" aria-hidden="false">
          <iframe
            class="mirror-frame"
            src="./mirror/invitation/index.html"
            title="Closed invitation"
            loading="eager"></iframe>
          <button class="open-overlay" id="openOverlay" type="button" aria-label="Open invitation"></button>
        </article>

        <article class="mirror-view mirror-view-open" id="openView" aria-hidden="true">
          <iframe
            class="mirror-frame"
            src="./mirror/open-invitation/index.html"
            title="Open invitation"
            loading="eager"></iframe>
        </article>
      </section>

      <div class="mirror-controls" role="group" aria-label="Invitation controls">
        <button class="mirror-button" id="openButton" type="button">Open Invitation</button>
        <button class="mirror-button" id="backButton" type="button" hidden>Return</button>
      </div>
    </main>

    <script src="./script.js" defer></script>
  </body>
</html>
