<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#120f14" />
    <meta
      name="description"
      content="Ciaran Engelbrecht and Cheylin Manuel Save the Date wedding invitation." />
    <title>Save the Date | Ciaran &amp; Cheylin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
      rel="stylesheet" />

    <link rel="preload" as="image" href="./images/closed%20envelop.png" />
    <link rel="preload" as="image" href="./images/Invitation%20full.png" />
    <link rel="preload" as="image" href="./images/Countdown.png" />

    <style>
      :root {
        --ink: #2f1f15;
        --wine: #4a2820;
        --gold: #d5b371;
        --gold-soft: #f0d9a4;
        --ivory: #f5ecda;
        --mist: rgba(255, 244, 220, 0.14);
        --shadow: rgba(10, 8, 7, 0.48);
        --scene-duration: 620ms;
        --scene-ease: cubic-bezier(0.19, 0.85, 0.24, 1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100dvh;
        font-family: "Cormorant Garamond", serif;
        color: var(--ivory);
        background: radial-gradient(circle at 12% 8%, #503320 0%, transparent 30%),
          radial-gradient(circle at 86% 10%, #2c1822 0%, transparent 35%),
          radial-gradient(circle at 50% 120%, #1b1320 0%, transparent 42%),
          linear-gradient(145deg, #0d0a11 0%, #120d16 45%, #0b0810 100%);
        overflow-x: hidden;
        padding: max(12px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right))
          max(12px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      }

      .ambient {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }

      .ambient::before,
      .ambient::after {
        content: "";
        position: absolute;
        inset: -24%;
      }

      .ambient::before {
        background: radial-gradient(circle, rgba(213, 179, 113, 0.12) 0%, rgba(213, 179, 113, 0) 60%);
        animation: driftWarm 18s ease-in-out infinite alternate;
      }

      .ambient::after {
        background-image: radial-gradient(2px 2px at 16% 24%, rgba(255, 238, 201, 0.3), transparent),
          radial-gradient(1px 1px at 74% 18%, rgba(255, 255, 255, 0.23), transparent),
          radial-gradient(2px 2px at 86% 74%, rgba(241, 201, 124, 0.22), transparent),
          radial-gradient(1px 1px at 28% 80%, rgba(255, 255, 255, 0.2), transparent);
        background-size: 310px 310px, 250px 250px, 280px 280px, 220px 220px;
        animation: sparkleShift 15s ease-in-out infinite alternate;
      }

      .invite-app {
        position: relative;
        z-index: 1;
        min-height: calc(100dvh - max(24px, env(safe-area-inset-top) + env(safe-area-inset-bottom)));
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .crest {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 1px;
      }

      .crest .eyebrow {
        margin: 0;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        font-size: 0.58rem;
        color: rgba(248, 228, 186, 0.78);
      }

      .crest .title {
        margin: 0;
        font-family: "Alex Brush", cursive;
        font-size: clamp(2rem, 10vw, 3.2rem);
        line-height: 0.95;
        color: #f6dca5;
        text-shadow: 0 4px 14px rgba(0, 0, 0, 0.35), 0 0 28px rgba(213, 179, 113, 0.3);
      }

      .stage-shell {
        width: min(98vw, 470px);
        height: min(146vw, 86dvh);
        border-radius: 26px;
        padding: clamp(5px, 1.3vw, 10px);
        position: relative;
        background: linear-gradient(150deg, rgba(243, 223, 182, 0.38), rgba(86, 52, 35, 0.45));
        box-shadow: 0 22px 64px var(--shadow), inset 0 1px 0 rgba(255, 242, 212, 0.44),
          0 0 0 1px rgba(250, 225, 170, 0.22);
        transition: width var(--scene-duration) var(--scene-ease),
          height var(--scene-duration) var(--scene-ease), transform var(--scene-duration) var(--scene-ease);
      }

      .stage-shell::before,
      .stage-shell::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .stage-shell::before {
        inset: 7px;
        border-radius: 20px;
        border: 1px solid rgba(255, 236, 199, 0.35);
      }

      .stage-shell::after {
        left: 14px;
        right: 14px;
        bottom: 8px;
        height: 18px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(0, 0, 0, 0.42), transparent 72%);
        filter: blur(8px);
      }

      .stage-shell.is-expanded {
        width: min(99vw, 560px);
        height: min(168vw, 92dvh);
      }

      .stage {
        appearance: none;
        border: 0;
        width: 100%;
        height: 100%;
        border-radius: 20px;
        padding: 0;
        position: relative;
        overflow: hidden;
        background: rgba(20, 14, 11, 0.85);
        cursor: pointer;
        box-shadow: inset 0 0 0 1px rgba(255, 232, 189, 0.2);
        transition: box-shadow 260ms ease;
      }

      .stage.is-busy {
        cursor: progress;
      }

      .stage.is-transitioning {
        pointer-events: none;
      }

      .stage:focus-visible {
        outline: 2px solid rgba(243, 206, 134, 0.94);
        outline-offset: 4px;
      }

      .scene {
        position: absolute;
        inset: 0;
        opacity: 0;
        transform: translateY(10px) scale(1.015);
        transition: opacity var(--scene-duration) var(--scene-ease), transform var(--scene-duration) var(--scene-ease);
        pointer-events: none;
        will-change: opacity, transform;
      }

      .scene.is-active {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .scene.is-leaving {
        opacity: 0;
        transform: translateY(-8px) scale(0.988);
      }

      .scene-art {
        width: 100%;
        height: 100%;
      }

      .scene-art img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        display: block;
        backface-visibility: hidden;
        transform-origin: center;
        will-change: transform;
      }

      .scene-closed .scene-art img {
        transform: scale(1.34);
      }

      .scene-full .scene-art img {
        transform: scale(1.03);
      }

      .scene-full .scene-art img,
      .scene-countdown .scene-art img {
        opacity: 0;
        transition: opacity 220ms ease, transform 300ms ease;
      }

      .scene-full.is-asset-ready .scene-art img,
      .scene-countdown.is-asset-ready .scene-art img {
        opacity: 1;
      }

      .scene-countdown .scene-art img {
        transform: scale(1.12);
      }

      .scene-sheen {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          130deg,
          rgba(255, 255, 255, 0.08) 0%,
          rgba(255, 255, 255, 0.02) 34%,
          rgba(255, 255, 255, 0) 56%,
          rgba(250, 222, 160, 0.12) 100%
        );
      }

      .scene-sheen::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          100deg,
          transparent 16%,
          rgba(255, 255, 255, 0.16) 38%,
          transparent 58%
        );
        transform: translateX(-112%);
        animation: sheenMove 7.2s ease-in-out infinite;
      }

      .ornate-corner {
        position: absolute;
        width: 54px;
        height: 54px;
        border: 1px solid rgba(240, 209, 142, 0.45);
        pointer-events: none;
      }

      .ornate-corner.top-left {
        top: 12px;
        left: 12px;
        border-right: 0;
        border-bottom: 0;
        border-top-left-radius: 12px;
      }

      .ornate-corner.top-right {
        top: 12px;
        right: 12px;
        border-left: 0;
        border-bottom: 0;
        border-top-right-radius: 12px;
      }

      .ornate-corner.bottom-left {
        bottom: 12px;
        left: 12px;
        border-right: 0;
        border-top: 0;
        border-bottom-left-radius: 12px;
      }

      .ornate-corner.bottom-right {
        bottom: 12px;
        right: 12px;
        border-left: 0;
        border-top: 0;
        border-bottom-right-radius: 12px;
      }

      .invitation-panel {
        position: absolute;
        left: 50%;
        top: 51.2%;
        transform: translate(-50%, -50%) scale(0.72);
        width: min(52%, 190px);
        max-height: 56%;
        overflow: hidden;
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        opacity: 0;
        transition: opacity 520ms ease, transform 760ms var(--scene-ease), filter 760ms var(--scene-ease);
        filter: blur(4px);
        pointer-events: none;
      }

      .invitation-panel::before,
      .invitation-panel::after {
        display: none;
      }

      .invitation-panel.is-revealed {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.79);
        filter: blur(0);
        animation: invitationBloom 880ms var(--scene-ease) both;
      }

      .copy-line {
        margin: 0;
        text-align: center;
        min-height: 0.98em;
        color: var(--wine);
        opacity: 0;
        filter: blur(4px);
        transform: translateY(10px);
        text-shadow: 0 1px 0 rgba(248, 239, 218, 0.55), 0 0 9px rgba(210, 176, 106, 0.22);
      }

      .copy-line + .copy-line {
        margin-top: clamp(1px, 0.45vw, 3px);
      }

      .copy-line.is-line-visible {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0);
        transition: opacity 460ms ease, filter 460ms ease, transform 460ms ease;
      }

      .copy-line .char {
        display: inline-block;
        opacity: 0;
        filter: blur(8px);
        transform: translateY(8px) rotate(-5deg) scale(0.94);
        text-shadow: 0 0 0 rgba(213, 179, 113, 0);
        animation: none;
      }

      .copy-line.is-writing .char {
        animation: inkCharacterFlow var(--char-duration, 560ms) cubic-bezier(0.17, 0.82, 0.22, 1) both;
        animation-delay: var(--char-delay, 0ms);
      }

      .copy-line .char.space {
        width: 0.26em;
      }

      .copy-line.is-complete .char {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0) rotate(0deg) scale(1);
      }

      .copy-line.family {
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: clamp(0.24rem, 1.15vw, 0.4rem);
      }

      .copy-line.save-date {
        margin-top: 0;
        font-family: "Alex Brush", cursive;
        font-size: clamp(0.72rem, 3.2vw, 1.22rem);
        line-height: 1;
        color: #7f4320;
        text-shadow: 0 1px 0 rgba(248, 236, 210, 0.68), 0 0 12px rgba(185, 132, 54, 0.34);
      }

      .copy-line.invite {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-weight: 600;
        font-size: clamp(0.38rem, 1.6vw, 0.56rem);
        letter-spacing: 0.045em;
      }

      .copy-line.amp {
        margin-top: clamp(1px, 0.6vw, 3px);
        font-family: "Alex Brush", cursive;
        font-size: clamp(0.58rem, 2.4vw, 0.9rem);
      }

      .copy-line.name {
        font-family: "Cinzel", serif;
        font-size: clamp(0.5rem, 2.2vw, 0.8rem);
        letter-spacing: 0.036em;
        text-transform: uppercase;
      }

      .copy-line.date {
        margin-top: clamp(3px, 0.7vw, 5px);
        font-family: "Cinzel", serif;
        font-size: clamp(0.34rem, 1.5vw, 0.54rem);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .copy-line.year {
        font-family: "Cinzel", serif;
        font-size: clamp(0.62rem, 2.7vw, 0.98rem);
        letter-spacing: 0.13em;
      }

      .copy-line.location {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-weight: 600;
        font-size: clamp(0.34rem, 1.5vw, 0.54rem);
        letter-spacing: 0.05em;
      }

      .copy-line.note {
        margin-top: clamp(3px, 0.8vw, 5px);
        font-family: "Cinzel", serif;
        font-size: clamp(0.28rem, 1.2vw, 0.42rem);
        text-transform: uppercase;
        letter-spacing: 0.09em;
      }

      .invite-modal {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: grid;
        place-items: center;
        padding: max(16px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right))
          max(16px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
        opacity: 0;
        pointer-events: none;
        transition: opacity 320ms ease;
      }

      .invite-modal[hidden] {
        display: none;
      }

      .invite-modal.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .invite-modal-backdrop {
        position: absolute;
        inset: 0;
        border: 0;
        padding: 0;
        margin: 0;
        background: rgba(11, 8, 10, 0.72);
        backdrop-filter: blur(5px);
      }

      .invite-modal-dialog {
        position: relative;
        width: min(95vw, 620px);
        height: min(168vw, 92dvh);
        border-radius: 26px;
        padding: 12px;
        background: radial-gradient(circle at 50% 0%, rgba(242, 211, 147, 0.18), rgba(242, 211, 147, 0) 42%),
          linear-gradient(145deg, rgba(39, 24, 18, 0.96), rgba(20, 13, 10, 0.96));
        border: 1px solid rgba(246, 220, 164, 0.34);
        box-shadow: 0 28px 72px rgba(0, 0, 0, 0.58), 0 0 0 1px rgba(213, 176, 103, 0.22),
          inset 0 1px 0 rgba(255, 242, 212, 0.42), inset 0 0 42px rgba(210, 168, 94, 0.12);
        transform: translateY(16px) scale(0.96);
        opacity: 0;
        transition: transform 320ms ease, opacity 320ms ease;
      }

      .invite-modal-dialog::before,
      .invite-modal-dialog::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .invite-modal-dialog::before {
        inset: 5px;
        border-radius: 21px;
        border: 1px solid rgba(241, 210, 147, 0.34);
      }

      .invite-modal-dialog::after {
        inset: 18px;
        border-radius: 15px;
        border: 1px solid rgba(194, 146, 62, 0.28);
        box-shadow: inset 0 0 22px rgba(236, 196, 120, 0.08);
        background: linear-gradient(
          90deg,
          rgba(241, 210, 147, 0) 0%,
          rgba(241, 210, 147, 0.08) 50%,
          rgba(241, 210, 147, 0) 100%
        );
        mix-blend-mode: screen;
      }

      .invite-modal.is-open .invite-modal-dialog {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      .invite-modal-close {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 3;
        border: 1px solid rgba(243, 211, 146, 0.74);
        border-radius: 999px;
        padding: 8px 13px;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.54rem;
        color: #f8e7be;
        background: linear-gradient(180deg, rgba(80, 47, 29, 0.9), rgba(34, 22, 16, 0.92));
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 236, 198, 0.26);
        cursor: pointer;
        transition: transform 220ms ease, box-shadow 220ms ease;
      }

      .invite-modal-close:hover,
      .invite-modal-close:focus-visible {
        transform: translateY(-1px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.34), 0 0 16px rgba(216, 180, 105, 0.3);
      }

      .invite-modal-card {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 18px;
        overflow: hidden;
        background: radial-gradient(circle at 50% 8%, rgba(212, 169, 93, 0.2), rgba(212, 169, 93, 0) 48%),
          rgba(22, 14, 12, 0.9);
      }

      .invite-modal-card::before,
      .invite-modal-card::after {
        content: "";
        position: absolute;
        pointer-events: none;
        z-index: 2;
      }

      .invite-modal-card::before {
        inset: 10px;
        border-radius: 14px;
        border: 1px solid rgba(244, 213, 149, 0.35);
      }

      .invite-modal-card::after {
        left: 28px;
        right: 28px;
        top: 20px;
        bottom: 20px;
        border-top: 1px solid rgba(244, 213, 149, 0.2);
        border-bottom: 1px solid rgba(244, 213, 149, 0.2);
      }

      .invite-modal-card img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        transform: scale(1.08);
      }

      .invite-modal-panel {
        position: absolute;
        left: 50%;
        top: 52%;
        transform: translate(-50%, -50%);
        width: min(84%, 500px);
        max-height: 86%;
        overflow: hidden;
        padding: clamp(12px, 2.4vw, 22px) clamp(12px, 2.8vw, 24px);
        border-radius: 14px;
        border: 1px solid rgba(195, 147, 63, 0.52);
        background: linear-gradient(180deg, rgba(247, 235, 212, 0.82), rgba(236, 217, 178, 0.74));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.58), 0 10px 34px rgba(51, 33, 22, 0.2),
          0 0 0 1px rgba(243, 208, 132, 0.2), 0 0 28px rgba(203, 156, 74, 0.2);
      }

      .invite-modal-panel::before,
      .invite-modal-panel::after {
        content: "";
        position: absolute;
        left: 14px;
        right: 14px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(177, 123, 44, 0.75), transparent);
      }

      .invite-modal-panel::before {
        top: 8px;
      }

      .invite-modal-panel::after {
        bottom: 8px;
      }

      .modal-line {
        margin: 0;
        min-height: 1.06em;
        text-align: center;
        color: var(--wine);
        text-shadow: none;
      }

      .modal-line + .modal-line {
        margin-top: clamp(4px, 1vw, 8px);
      }

      .modal-line.family {
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.17em;
        font-size: clamp(0.43rem, 2.1vw, 0.76rem);
      }

      .modal-line.save-date {
        margin-top: 0;
        font-family: "Alex Brush", cursive;
        font-size: clamp(1.7rem, 7.5vw, 2.9rem);
        line-height: 1;
        color: #7f4320;
        text-shadow: 0 1px 0 rgba(248, 236, 210, 0.68), 0 0 18px rgba(185, 132, 54, 0.34);
      }

      .modal-line.invite {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-weight: 600;
        font-size: clamp(0.74rem, 3.3vw, 1.08rem);
        letter-spacing: 0.05em;
      }

      .modal-line.amp {
        margin-top: clamp(2px, 0.8vw, 5px);
        font-family: "Alex Brush", cursive;
        font-size: clamp(1.16rem, 5vw, 1.68rem);
      }

      .modal-line.name {
        font-family: "Cinzel", serif;
        font-size: clamp(1.04rem, 4.8vw, 1.96rem);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .modal-line.date {
        margin-top: clamp(6px, 1.6vw, 10px);
        font-family: "Cinzel", serif;
        font-size: clamp(0.72rem, 3.1vw, 1.05rem);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .modal-line.year {
        font-family: "Cinzel", serif;
        font-size: clamp(1.28rem, 5.8vw, 2rem);
        letter-spacing: 0.21em;
      }

      .modal-line.location {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-weight: 600;
        font-size: clamp(0.72rem, 3.2vw, 1.04rem);
        letter-spacing: 0.06em;
      }

      .modal-line.note {
        margin-top: clamp(8px, 2.1vw, 14px);
        font-family: "Cinzel", serif;
        font-size: clamp(0.58rem, 2.5vw, 0.9rem);
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      .countdown-wrap {
        position: absolute;
        left: 50%;
        bottom: clamp(14px, 3vw, 24px);
        transform: translateX(-50%);
        width: min(92%, 500px);
        border-radius: 14px;
        border: 1px solid rgba(238, 206, 137, 0.52);
        background: linear-gradient(180deg, rgba(14, 8, 5, 0.7), rgba(14, 9, 8, 0.5));
        backdrop-filter: blur(2px);
        padding: clamp(10px, 2.2vw, 14px);
        box-shadow: 0 0 24px rgba(210, 176, 106, 0.24);
      }

      .countdown-kicker {
        margin: 0;
        text-align: center;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        font-size: clamp(0.56rem, 2.4vw, 0.76rem);
        color: rgba(246, 225, 182, 0.92);
      }

      .countdown-grid {
        margin-top: 8px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .count-unit {
        border-radius: 10px;
        border: 1px solid rgba(243, 212, 144, 0.38);
        background: rgba(22, 13, 10, 0.55);
        padding: 6px 4px;
        text-align: center;
      }

      .count-value {
        margin: 0;
        font-family: "Cinzel", serif;
        font-size: clamp(1rem, 4.8vw, 1.72rem);
        color: #f7e4bc;
        letter-spacing: 0.06em;
        line-height: 1.05;
      }

      .count-label {
        margin: 2px 0 0;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: clamp(0.48rem, 2.1vw, 0.62rem);
        color: rgba(248, 232, 196, 0.78);
      }

      .countdown-meta {
        margin: 8px 0 0;
        text-align: center;
        font-size: clamp(0.62rem, 2.6vw, 0.8rem);
        letter-spacing: 0.04em;
        color: rgba(255, 239, 206, 0.8);
      }

      .countdown-status {
        margin: 4px 0 0;
        text-align: center;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: clamp(0.5rem, 2.2vw, 0.66rem);
        color: rgba(244, 215, 156, 0.92);
      }

      .tap-hint {
        margin: 0;
        min-height: 22px;
        text-align: center;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.13em;
        font-size: 0.62rem;
        color: rgba(247, 232, 197, 0.86);
      }

      .tap-hint.is-muted {
        color: rgba(247, 232, 197, 0.64);
      }

      .stage-actions {
        min-height: 44px;
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: center;
      }

      .stage-action {
        border: 1px solid rgba(242, 209, 142, 0.52);
        color: #fbe7bd;
        background: linear-gradient(180deg, rgba(46, 28, 19, 0.88), rgba(28, 18, 13, 0.9));
        border-radius: 999px;
        padding: 10px 16px;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.58rem;
        cursor: pointer;
        transition: transform 260ms ease, box-shadow 260ms ease, border-color 260ms ease;
      }

      .stage-action:hover,
      .stage-action:focus-visible {
        transform: translateY(-1px);
        border-color: rgba(250, 225, 172, 0.86);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.28), 0 0 16px rgba(212, 174, 98, 0.26);
      }

      .stage-action:focus-visible {
        outline: 2px solid rgba(247, 216, 154, 0.96);
        outline-offset: 3px;
      }

      .stage-action.primary {
        background: linear-gradient(180deg, rgba(84, 50, 30, 0.93), rgba(46, 28, 17, 0.92));
      }

      .stage-action[hidden] {
        display: none;
      }

      .progress-dots {
        display: inline-flex;
        gap: 7px;
        align-items: center;
      }

      .progress-dots span {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        border: 1px solid rgba(248, 225, 177, 0.48);
        background: rgba(248, 225, 177, 0.18);
        transition: transform 300ms ease, background-color 300ms ease, box-shadow 300ms ease;
      }

      .progress-dots span.is-on {
        transform: scale(1.24);
        background: rgba(248, 225, 177, 0.92);
        box-shadow: 0 0 11px rgba(248, 225, 177, 0.62);
      }

      .noscript {
        margin-top: 12px;
        font-family: "Cinzel", serif;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.72rem;
        color: rgba(255, 233, 194, 0.8);
      }

      @media (min-width: 820px) {
        .invite-app {
          gap: 14px;
        }

        .stage-shell {
          width: min(86vw, 520px);
          height: min(126vw, 88dvh);
        }

        .stage-shell.is-expanded {
          width: min(90vw, 640px);
          height: min(132vw, 94dvh);
        }

        .stage-action {
          font-size: 0.62rem;
        }

        .invitation-panel {
          width: min(48%, 220px);
          max-height: 50%;
          transform: translate(-50%, -50%) scale(0.69);
        }

        .invitation-panel.is-revealed {
          transform: translate(-50%, -50%) scale(0.74);
        }

        .invite-modal-dialog {
          width: min(86vw, 700px);
          height: min(140vw, 94dvh);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 1ms !important;
          scroll-behavior: auto !important;
        }

        .ambient::before,
        .ambient::after,
        .scene-sheen::after {
          animation: none !important;
        }

        .copy-line .char {
          animation: none !important;
          opacity: 1 !important;
          filter: blur(0) !important;
          transform: none !important;
        }

        .copy-line.is-writing .char {
          animation: none !important;
        }

        .invite-modal,
        .invite-modal-dialog {
          transition: none !important;
        }
      }

      @keyframes driftWarm {
        from {
          transform: translate3d(-1%, -2%, 0);
          opacity: 0.8;
        }
        to {
          transform: translate3d(2%, 2%, 0);
          opacity: 1;
        }
      }

      @keyframes sparkleShift {
        from {
          transform: scale(1);
          opacity: 0.7;
        }
        to {
          transform: scale(1.05);
          opacity: 0.95;
        }
      }

      @keyframes sheenMove {
        0% {
          transform: translateX(-112%);
        }
        100% {
          transform: translateX(122%);
        }
      }

      @keyframes invitationBloom {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.95);
          filter: blur(6px);
        }
        70% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.01);
          filter: blur(0);
        }
        100% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
          filter: blur(0);
        }
      }

      @keyframes inkCharacterFlow {
        0% {
          opacity: 0;
          filter: blur(8px);
          transform: translateY(8px) rotate(-6deg) scale(0.94);
          text-shadow: 0 0 0 rgba(213, 179, 113, 0);
        }
        62% {
          opacity: 1;
          filter: blur(0);
          transform: translateY(-1px) rotate(0.6deg) scale(1.03);
          text-shadow: 0 0 11px rgba(213, 179, 113, 0.34);
        }
        100% {
          opacity: 1;
          filter: blur(0);
          transform: translateY(0) rotate(0deg) scale(1);
          text-shadow: 0 0 0 rgba(213, 179, 113, 0);
        }
      }
    </style>
  </head>

  <body>
    <div class="ambient" aria-hidden="true"></div>

    <main class="invite-app">
      <header class="crest" aria-hidden="true">
        <p class="eyebrow">Save the Date</p>
        <h1 class="title">Ciaran &amp; Cheylin</h1>
      </header>

      <div class="stage-shell" id="stageShell">
        <button
          class="stage"
          id="stage"
          type="button"
          aria-label="Closed envelope. Tap to open."
          aria-live="polite">
          <div class="scene scene-closed is-active" data-scene="closed" data-index="0">
            <div class="scene-art">
              <img src="./images/closed%20envelop.png" alt="Closed envelope" loading="eager" />
            </div>
            <div class="scene-sheen" aria-hidden="true"></div>
          </div>

          <div class="scene scene-full" data-scene="full" data-index="1">
            <div class="scene-art">
              <img
                src="./images/Invitation%20full.png"
                alt="Full invitation"
                loading="eager"
                fetchpriority="high"
                decoding="sync" />
            </div>
            <div class="scene-sheen" aria-hidden="true"></div>

            <div class="invitation-panel" id="invitationPanel" aria-live="polite">
              <p class="copy-line save-date" data-text="Save the Date">Save the Date</p>
              <p class="copy-line family" data-text="TOGETHER WITH THEIR FAMILIES">TOGETHER WITH THEIR FAMILIES</p>
              <p class="copy-line name" data-text="CIARAN ENGELBRECHT">CIARAN ENGELBRECHT</p>
              <p class="copy-line name" data-text="&amp; CHEYLIN MANUEL">&amp; CHEYLIN MANUEL</p>
              <p class="copy-line invite" data-text="Invite you to celebrate their wedding">Invite you to celebrate their wedding</p>
              <p class="copy-line date" data-text="SUNDAY, 26TH SEPTEMBER">SUNDAY, 26TH SEPTEMBER</p>
              <p class="copy-line year" data-text="2027">2027</p>
              <p class="copy-line location" data-text="Perth, Western Australia">Perth, Western Australia</p>
              <p class="copy-line note" data-text="Formal Invitation to follow">Formal Invitation to follow</p>
            </div>
          </div>

          <div class="scene scene-countdown" data-scene="countdown" data-index="2">
            <div class="scene-art">
              <img src="./images/Countdown.png" alt="Wedding countdown" loading="lazy" />
            </div>
            <div class="scene-sheen" aria-hidden="true"></div>

            <div class="countdown-wrap" role="status" aria-live="polite">
              <p class="countdown-kicker">Until We Say I Do</p>

              <div class="countdown-grid" aria-label="Time remaining to the wedding date">
                <div class="count-unit">
                  <p class="count-value" id="countDays">000</p>
                  <p class="count-label">Days</p>
                </div>
                <div class="count-unit">
                  <p class="count-value" id="countHours">00</p>
                  <p class="count-label">Hours</p>
                </div>
                <div class="count-unit">
                  <p class="count-value" id="countMinutes">00</p>
                  <p class="count-label">Minutes</p>
                </div>
                <div class="count-unit">
                  <p class="count-value" id="countSeconds">00</p>
                  <p class="count-label">Seconds</p>
                </div>
              </div>

              <p class="countdown-meta">Sunday, 26 September 2027 • 2:00 PM • Perth, WA</p>
              <p class="countdown-status" id="countdownStatus">Counting down in real time</p>
            </div>
          </div>

          <span class="ornate-corner top-left" aria-hidden="true"></span>
          <span class="ornate-corner top-right" aria-hidden="true"></span>
          <span class="ornate-corner bottom-left" aria-hidden="true"></span>
          <span class="ornate-corner bottom-right" aria-hidden="true"></span>
        </button>
      </div>

      <p class="tap-hint" id="tapHint">Tap to open the envelope</p>

      <div class="stage-actions" id="stageActions">
        <button class="stage-action primary" id="countdownBtn" type="button" hidden>
          Open Live Countdown
        </button>
        <button class="stage-action" id="invitationBtn" type="button" hidden>
          Return to Invitation
        </button>
      </div>

      <div
        class="invite-modal"
        id="inviteModal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="inviteModalTitle"
        hidden>
        <button class="invite-modal-backdrop" id="inviteModalBackdrop" type="button" aria-label="Close enlarged invitation"></button>
        <div class="invite-modal-dialog" role="document">
          <button class="invite-modal-close" id="inviteModalClose" type="button" aria-label="Close enlarged invitation">
            Close
          </button>

          <div class="invite-modal-card">
            <img src="./images/Invitation%20full.png" alt="Large invitation preview" loading="eager" />

            <div class="invite-modal-panel">
              <p class="modal-line save-date">Save the Date</p>
              <p class="modal-line family" id="inviteModalTitle">TOGETHER WITH THEIR FAMILIES</p>
              <p class="modal-line name">CIARAN ENGELBRECHT</p>
              <p class="modal-line name">&amp; CHEYLIN MANUEL</p>
              <p class="modal-line invite">Invite you to celebrate their wedding</p>
              <p class="modal-line date">SUNDAY, 26TH SEPTEMBER</p>
              <p class="modal-line year">2027</p>
              <p class="modal-line location">Perth, Western Australia</p>
              <p class="modal-line note">Formal Invitation to follow</p>
            </div>
          </div>
        </div>
      </div>

      <div class="progress-dots" id="progressDots" aria-hidden="true">
        <span class="is-on"></span>
        <span></span>
        <span></span>
      </div>

      <noscript>
        <p class="noscript">JavaScript enables the full invitation animation experience.</p>
      </noscript>
    </main>

    <script>
      (() => {
        const SCENES = {
          closed: 0,
          full: 1,
          countdown: 2
        };

        const stage = document.getElementById("stage");
        const stageShell = document.getElementById("stageShell");
        const tapHint = document.getElementById("tapHint");
        const countdownBtn = document.getElementById("countdownBtn");
        const invitationBtn = document.getElementById("invitationBtn");
        const inviteModal = document.getElementById("inviteModal");
        const inviteModalBackdrop = document.getElementById("inviteModalBackdrop");
        const inviteModalClose = document.getElementById("inviteModalClose");

        const countDays = document.getElementById("countDays");
        const countHours = document.getElementById("countHours");
        const countMinutes = document.getElementById("countMinutes");
        const countSeconds = document.getElementById("countSeconds");
        const countdownStatus = document.getElementById("countdownStatus");

        const dots = Array.from(document.querySelectorAll("#progressDots span"));
        const scenes = Array.from(document.querySelectorAll(".scene"));
        const fullSceneElement = document.querySelector(".scene-full");
        const countdownSceneElement = document.querySelector(".scene-countdown");
        const invitationPanel = document.getElementById("invitationPanel");
        const copyLines = Array.from(document.querySelectorAll(".copy-line"));
        const fullSceneImage = document.querySelector(".scene-full img");
        const countdownSceneImage = document.querySelector(".scene-countdown img");
        const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        let currentScene = SCENES.closed;
        let isTransitioning = false;
        let fullSceneReady = false;
        let queuedReveal = false;
        let modalOpen = false;
        const invitationTimers = [];

        const weddingTarget = new Date("2027-09-26T14:00:00+08:00").getTime();

        copyLines.forEach((line) => {
          if (!line.dataset.text) {
            line.dataset.text = line.textContent.trim();
          }
        });

        function initializeInvitationCharacters() {
          copyLines.forEach((line) => {
            const lineText = (line.dataset.text || "").replace(/&amp;/g, "&");
            line.textContent = "";

            const fragment = document.createDocumentFragment();
            const chars = Array.from(lineText);
            chars.forEach((character) => {
              const span = document.createElement("span");
              span.className = character === " " ? "char space" : "char";
              span.textContent = character === " " ? "\u00A0" : character;
              fragment.appendChild(span);
            });

            line.appendChild(fragment);
            line._chars = Array.from(line.querySelectorAll(".char"));
          });
        }

        function clearInvitationTimers() {
          while (invitationTimers.length) {
            clearTimeout(invitationTimers.pop());
          }
        }

        function queueInvitationTimer(callback, delay) {
          const timer = window.setTimeout(callback, delay);
          invitationTimers.push(timer);
        }

        function decodeImageElement(imageElement) {
          if (!imageElement) {
            return Promise.resolve();
          }

          if (imageElement.complete && imageElement.naturalWidth > 0) {
            if (typeof imageElement.decode === "function") {
              return imageElement.decode().catch(() => undefined);
            }
            return Promise.resolve();
          }

          return new Promise((resolve) => {
            const done = () => {
              if (typeof imageElement.decode === "function") {
                imageElement.decode().catch(() => undefined).finally(resolve);
              } else {
                resolve();
              }
            };

            imageElement.addEventListener("load", done, { once: true });
            imageElement.addEventListener("error", resolve, { once: true });
          });
        }

        function prepareSceneAssets() {
          stage.classList.add("is-busy");
          setHint("Preparing your invitation...", true);

          Promise.all([decodeImageElement(fullSceneImage), decodeImageElement(countdownSceneImage)]).finally(
            () => {
              fullSceneReady = true;
              stage.classList.remove("is-busy");
              fullSceneElement.classList.add("is-asset-ready");
              countdownSceneElement.classList.add("is-asset-ready");

              if (currentScene === SCENES.closed) {
                setHint("Tap to open the envelope");
              }

              if (queuedReveal) {
                queuedReveal = false;
                transitionToScene(SCENES.full);
              }
            }
          );
        }

        function pad(value) {
          return String(value).padStart(2, "0");
        }

        function setHint(message, muted = false) {
          tapHint.textContent = message;
          tapHint.classList.toggle("is-muted", muted);
        }

        function setActiveDots(index) {
          dots.forEach((dot, dotIndex) => {
            dot.classList.toggle("is-on", dotIndex <= index);
          });
        }

        function setAriaLabel(index) {
          const labels = [
            "Closed envelope. Tap to open.",
            "Full invitation displayed. Tap to open enlarged view or use countdown button.",
            "Countdown scene displayed."
          ];
          stage.setAttribute("aria-label", labels[index] || labels[0]);
        }

        function syncButtons(index) {
          countdownBtn.hidden = index !== SCENES.full;
          invitationBtn.hidden = index !== SCENES.countdown;
        }

        function updateShellSize(index) {
          stageShell.classList.toggle("is-expanded", index === SCENES.countdown);
        }

        function lineTiming(line) {
          if (line.classList.contains("save-date")) {
            return { step: 24, lineGap: 42, duration: 560 };
          }

          if (line.classList.contains("name")) {
            return { step: 16, lineGap: 30, duration: 540 };
          }

          if (line.classList.contains("year")) {
            return { step: 18, lineGap: 26, duration: 520 };
          }

          return { step: 14, lineGap: 24, duration: 500 };
        }

        function animateLineCharacters(line, startDelay) {
          const lineChars = line._chars || [];
          const charCount = lineChars.length;

          line.classList.remove("is-writing", "is-line-visible", "is-complete");

          if (reducedMotion) {
            line.classList.add("is-line-visible", "is-complete");
            return { nextStart: startDelay + 24, lineEnd: startDelay + 24 };
          }

          const timing = lineTiming(line);

          lineChars.forEach((char, charIndex) => {
            char.style.setProperty("--char-delay", `${charIndex * timing.step}ms`);
            char.style.setProperty("--char-duration", `${timing.duration}ms`);
          });

          queueInvitationTimer(() => {
            line.classList.add("is-line-visible", "is-writing");
          }, Math.max(0, startDelay - 40));

          const lastCharOffset = Math.max(0, (charCount - 1) * timing.step);
          const lineEnd = startDelay + lastCharOffset + timing.duration;
          const nextStart = startDelay + charCount * timing.step + timing.lineGap;
          return { nextStart, lineEnd };
        }

        function revealInvitation() {
          clearInvitationTimers();

          copyLines.forEach((line) => {
            line.classList.remove("is-writing", "is-line-visible", "is-complete");
          });

          invitationPanel.classList.remove("is-revealed");
          void invitationPanel.offsetWidth;
          invitationPanel.classList.add("is-revealed");

          let nextStart = reducedMotion ? 0 : 110;
          let maxLineEnd = 0;

          copyLines.forEach((line) => {
            const result = animateLineCharacters(line, nextStart);
            nextStart = result.nextStart;
            maxLineEnd = Math.max(maxLineEnd, result.lineEnd);
          });

          queueInvitationTimer(() => {
            copyLines.forEach((line) => {
              line.classList.remove("is-writing");
              line.classList.add("is-complete");
            });
          }, maxLineEnd + 80);
        }

        function openInviteModal() {
          if (modalOpen || currentScene !== SCENES.full) {
            return;
          }

          modalOpen = true;
          inviteModal.hidden = false;
          requestAnimationFrame(() => {
            inviteModal.classList.add("is-open");
          });
          document.body.style.overflow = "hidden";
          setHint("Enlarged invitation open. Close to return.", true);
        }

        function closeInviteModal(immediate = false) {
          if (!modalOpen && inviteModal.hidden) {
            return;
          }

          modalOpen = false;
          inviteModal.classList.remove("is-open");

          const finalizeClose = () => {
            inviteModal.hidden = true;
            document.body.style.overflow = "";
            if (currentScene === SCENES.full) {
              setHint("Tap the invitation for full-screen preview, or use countdown button below");
            }
          };

          if (immediate || reducedMotion) {
            finalizeClose();
          } else {
            window.setTimeout(finalizeClose, 260);
          }
        }

        function updateCountdown() {
          const now = Date.now();
          const diff = Math.max(weddingTarget - now, 0);

          const dayMs = 24 * 60 * 60 * 1000;
          const hourMs = 60 * 60 * 1000;
          const minuteMs = 60 * 1000;

          const days = Math.floor(diff / dayMs);
          const hours = Math.floor((diff % dayMs) / hourMs);
          const minutes = Math.floor((diff % hourMs) / minuteMs);
          const seconds = Math.floor((diff % minuteMs) / 1000);

          countDays.textContent = String(days).padStart(3, "0");
          countHours.textContent = pad(hours);
          countMinutes.textContent = pad(minutes);
          countSeconds.textContent = pad(seconds);

          if (diff === 0) {
            countdownStatus.textContent = "It is wedding time";
          } else {
            countdownStatus.textContent = "Counting down to 2:00 PM on wedding day";
          }
        }

        function transitionToScene(targetIndex) {
          if (
            isTransitioning ||
            targetIndex === currentScene ||
            targetIndex < SCENES.closed ||
            targetIndex > SCENES.countdown
          ) {
            return;
          }

          isTransitioning = true;
          stage.classList.add("is-transitioning");

          if (targetIndex !== SCENES.full) {
            closeInviteModal(true);
          }

          if (targetIndex === SCENES.full) {
            clearInvitationTimers();
            invitationPanel.classList.remove("is-revealed");
          }

          const previous = scenes[currentScene];
          const next = scenes[targetIndex];

          previous.classList.remove("is-active");
          previous.classList.add("is-leaving");
          next.classList.add("is-active");
          next.classList.remove("is-leaving");

          updateShellSize(targetIndex);
          setActiveDots(targetIndex);
          setAriaLabel(targetIndex);
          syncButtons(targetIndex);

          window.setTimeout(() => {
            previous.classList.remove("is-leaving");
            currentScene = targetIndex;
            isTransitioning = false;
            stage.classList.remove("is-transitioning");

            if (currentScene === SCENES.closed) {
              setHint("Tap to open the envelope");
            } else if (currentScene === SCENES.full) {
              setHint("Tap the invitation for full-screen preview, or use countdown button below");
              revealInvitation();
            } else {
              setHint("Live countdown to Sunday, 26 September 2027 at 2:00 PM", true);
            }
          }, reducedMotion ? 1 : 680);
        }

        function handleStageAdvance() {
          if (isTransitioning) {
            return;
          }

          if (currentScene === SCENES.closed) {
            if (!fullSceneReady) {
              queuedReveal = true;
              setHint("Preparing your invitation...", true);
              return;
            }
            transitionToScene(SCENES.full);
            return;
          }

          if (currentScene === SCENES.full) {
            openInviteModal();
          }
        }

        stage.addEventListener("click", handleStageAdvance);

        stage.addEventListener("keydown", (event) => {
          if (modalOpen) {
            return;
          }

          if (
            (event.key === "Enter" || event.key === " " || event.key === "ArrowRight") &&
            currentScene === SCENES.closed
          ) {
            event.preventDefault();
            handleStageAdvance();
          }

          if ((event.key === "Enter" || event.key === " ") && currentScene === SCENES.full) {
            event.preventDefault();
            openInviteModal();
          }
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && modalOpen) {
            event.preventDefault();
            closeInviteModal();
          }
        });

        countdownBtn.addEventListener("click", () => {
          transitionToScene(SCENES.countdown);
        });

        invitationBtn.addEventListener("click", () => {
          transitionToScene(SCENES.full);
        });

        inviteModalBackdrop.addEventListener("click", () => {
          closeInviteModal();
        });

        inviteModalClose.addEventListener("click", () => {
          closeInviteModal();
        });

        setActiveDots(SCENES.closed);
        setAriaLabel(SCENES.closed);
        updateShellSize(SCENES.closed);
        syncButtons(SCENES.closed);
        setHint("Preparing your invitation...", true);
        updateCountdown();
        window.setInterval(updateCountdown, 1000);
        initializeInvitationCharacters();
        prepareSceneAssets();
      })();
    </script>
  </body>
</html>
