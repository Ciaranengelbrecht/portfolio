<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ciaran &amp; Cheylin | Save the Date</title>
    <meta name="description" content="Wedding invitation for Ciaran and Cheylin." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Allura&family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="invite-page" data-step="closed">
    <main class="invite-shell" aria-label="Wedding invitation">
      <section class="stage" aria-live="polite">
        <article class="scene scene-closed" id="closedScene" aria-hidden="false">
          <div class="canvas canvas-closed">
            <img class="asset flower flower-c1" src="./assets/3daboveflowers.png" alt="" />
            <img class="asset flower flower-c2" src="./assets/3daboveflowers.png" alt="" />
            <img class="asset flower flower-c3" src="./assets/3daboveflowers.png" alt="" />
            <img class="asset flower flower-c4" src="./assets/3daboveflowers.png" alt="" />

            <img class="asset orchid orchid-c1" src="./assets/backgroundorchids1.png" alt="" />
            <img class="asset orchid orchid-c2" src="./assets/backgroundorchids2.png" alt="" />

            <div class="closed-envelope-wrap">
              <img class="asset envelope-front" src="./assets/closedletter.png" alt="Closed envelope" />
              <img class="asset wax-seal" src="./assets/stampoverlay.png" alt="" />
              <span class="seal-text" aria-hidden="true">C &amp; C</span>

              <button id="openOverlay" class="overlay-button" type="button" aria-label="Open invitation"></button>
            </div>
          </div>
        </article>

        <article class="scene scene-open" id="openScene" aria-hidden="true">
          <div class="canvas canvas-open">
            <img class="asset flower flower-o1" src="./assets/3daboveflowers.png" alt="" />
            <img class="asset flower flower-o2" src="./assets/3daboveflowers.png" alt="" />
            <img class="asset flower flower-o3" src="./assets/3daboveflowers.png" alt="" />
            <img class="asset flower flower-o4" src="./assets/3daboveflowers.png" alt="" />

            <img class="asset orchid orchid-o1" src="./assets/backgroundorchids1.png" alt="" />
            <img class="asset orchid orchid-o2" src="./assets/backgroundorchids2.png" alt="" />

            <img class="asset envelope-back" src="./assets/openbottomletter.png" alt="Opened envelope" />

            <section class="invite-paper" aria-label="Invitation text">
              <div class="paper-inner">
                <p class="eyebrow">Save the Date</p>
                <p class="family">TOGETHER WITH THEIR FAMILLIES</p>

                <div class="names">
                  <div class="person">
                    <h2>Ciaran</h2>
                    <p>Engelbrecht</p>
                  </div>
                  <span class="amp">&amp;</span>
                  <div class="person">
                    <h2>Cheylin</h2>
                    <p>Manuel</p>
                  </div>
                </div>

                <p class="line italic">Invite you to celebrate their wedding</p>
                <p class="line strong">SUNDAY, 26<sup>TH</sup> SEPTEMBER 2027</p>
                <p class="line">Perth, Western Australia</p>
                <p class="line italic">Formal Invitation to follow</p>
              </div>

              <span class="paper-corner tl" aria-hidden="true"></span>
              <span class="paper-corner tr" aria-hidden="true"></span>
              <span class="paper-corner bl" aria-hidden="true"></span>
              <span class="paper-corner br" aria-hidden="true"></span>
            </section>

            <img class="asset envelope-front-open" src="./assets/openlettertop.png" alt="" />
          </div>
        </article>

        <button id="returnLink" class="return-link" type="button" hidden>&lt; Return</button>
      </section>
    </main>

    <script src="./script.js" defer></script>
  </body>
</html>
